apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-books
  labels:
    app: api-books
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-books
  template:
    metadata:
      labels:
        app: api-books
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: api-books
        image: apolzek/api-books:1.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
          name: http
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL

---

apiVersion: v1
kind: Service
metadata:
  name: api-books
spec:
  selector:
    app: api-books
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
